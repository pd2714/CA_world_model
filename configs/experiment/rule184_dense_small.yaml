experiment_name: rule184_dense_small
dataset_name: rule184_dense
seed: 7
data: configs/data/rule184.yaml
model: configs/model/dense_latent_1d_small.yaml
losses:
  closure_weight: 0.05
train:
  train:
    batch_size: 64
    epochs: 48
    lr: 0.001
    sequence_window: 10
    rollout_horizon: 4
    grad_clip: 1.0
    early_stopping_patience: 12
