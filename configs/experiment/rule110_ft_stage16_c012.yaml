experiment_name: rule110_ft_stage16_c012
dataset_name: rule110_dense
seed: 13
data: configs/data/rule110.yaml
model:
  model:
    name: dense_world_model
    latent_type: spatial
    latent_channels: 1
    latent_dim: 8
    latent_length: 8
    depth: 3
    dynamics_step_size: 1.0
    dynamics_use_post_norm: false
    dynamics_clamp_delta: 0.0
losses:
  closure_weight: 0.12
  latent_cycle_weight: 0.1
  latent_step_weight: 1.0e-3
  latent_rollout_weight: 2.0
train:
  train:
    batch_size: 128
    epochs: 8
    lr: 3.0e-4
    sequence_window: 18
    rollout_horizon: 16
    grad_clip: 0.5
    early_stopping_patience: 4
