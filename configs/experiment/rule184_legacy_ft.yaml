experiment_name: rule184_legacy_ft
dataset_name: rule184_mixedp_legacy_ft
seed: 7
data: configs/data/rule184_mixedp_legacy_ft.yaml
train: configs/train/rule184_legacy_ft.yaml
model:
  model:
    name: dense_world_model
    latent_type: spatial
    latent_channels: 32
    latent_dim: 64
    depth: 3
    dynamics_step_size: 0.25
    dynamics_use_post_norm: true
    dynamics_clamp_delta: 1.0
    legacy_rule184_compat: true
losses:
  recon_weight: 0.2
  rollout_weight: 1.0
  latent_rollout_weight: 2.5
  rollout_gamma: 0.98
  observable_weight: 0.5
  latent_l2_weight: 1.0e-4
  latent_cycle_weight: 0.0
  latent_step_weight: 1.0e-3
  closure_weight: 0.0
