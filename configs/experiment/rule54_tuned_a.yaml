experiment_name: rule54_tuned_a
dataset_name: rule54_dense
seed: 11
data: configs/data/rule54.yaml
model: configs/model/dense_latent_1d_stable.yaml
losses:
  closure_weight: 0.0
  latent_cycle_weight: 0.0
  latent_step_weight: 1.0e-3
  latent_rollout_weight: 2.0
train:
  train:
    batch_size: 64
    epochs: 10
    lr: 0.001
    sequence_window: 18
    rollout_horizon: 16
    grad_clip: 0.5
    early_stopping_patience: 6

