experiment_name: rule184_bottleneck_mixedp_curriculum_1x8
dataset_name: rule184_mixedp_1x8
seed: 7
data: configs/data/rule184_mixedp_long.yaml
model: configs/model/dense_latent_1d_bottleneck.yaml
losses:
  recon_weight: 1.0
  recon_weight_schedule:
    - start_epoch: 1
      value: 2.0
    - start_epoch: 4
      value: 1.0
  pred_weight: 1.0
  pred_weight_schedule:
    - start_epoch: 1
      value: 0.0
    - start_epoch: 4
      value: 1.0
  observable_weight: 0.5
  observable_weight_schedule:
    - start_epoch: 1
      value: 0.0
    - start_epoch: 4
      value: 0.5
  closure_weight: 0.1
  closure_weight_schedule:
    - start_epoch: 1
      value: 0.0
    - start_epoch: 5
      value: 0.05
    - start_epoch: 9
      value: 0.1
  latent_rollout_weight: 2.0
  latent_rollout_weight_schedule:
    - start_epoch: 1
      value: 0.0
    - start_epoch: 4
      value: 0.5
    - start_epoch: 7
      value: 1.0
    - start_epoch: 10
      value: 2.0
  latent_step_weight: 1.0e-3
  latent_step_weight_schedule:
    - start_epoch: 1
      value: 0.0
    - start_epoch: 4
      value: 1.0e-3
  latent_cycle_weight: 0.0
train:
  train:
    batch_size: 64
    epochs: 12
    lr: 0.001
    sequence_window: 18
    rollout_horizon: 1
    rollout_horizon_schedule:
      - start_epoch: 1
        value: 1
      - start_epoch: 5
        value: 2
      - start_epoch: 7
        value: 4
      - start_epoch: 9
        value: 8
      - start_epoch: 11
        value: 16
    grad_clip: 0.5
    early_stopping_patience: 8
